name: Build macOS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to build"
        required: false
        default: "feature/macos-test"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos:
    name: macOS ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: arm64
            runner: macos-15
            arch: arm64
          - name: x86_64
            runner: macos-15-intel
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Generate embedded resources
        shell: bash
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          if command -v python3 >/dev/null 2>&1; then
            python3 mods/generate.py
          else
            python mods/generate.py
          fi

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} \
            -DMC_DEV_TOOL_BUILD_TEST=OFF \
            -DMC_DEV_TOOL_BUILD_MCDK=ON \
            -DMC_DEV_TOOL_BUILD_MCDK_STDIO_BRIDGE=ON \
            -DMC_DEV_TOOL_MCDK_ENABLE_CLI=OFF

      - name: Build
        shell: bash
        run: |
          cmake --build build --config Release --target mcdk mcdk_stdio_bridge --parallel --verbose

      - name: Package
        shell: bash
        run: |
          mkdir -p package dist

          MCDK="$(find build -type f -name mcdk -print -quit)"
          BRIDGE="$(find build -type f -name mcdk_stdio_bridge -print -quit)"

          test -n "$MCDK"
          test -n "$BRIDGE"

          cp "$MCDK" package/mcdk
          cp "$BRIDGE" package/mcdk_stdio_bridge
          chmod +x package/mcdk package/mcdk_stdio_bridge

          tar -czf "dist/mcdk-macos-${{ matrix.name }}.tar.gz" -C package mcdk mcdk_stdio_bridge

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: mcdk-macos-${{ matrix.name }}
          path: dist/*.tar.gz
